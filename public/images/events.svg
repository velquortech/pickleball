<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Pennant banners over a pickleball ball">
  <rect width="800" height="500" fill="#111c2d"/>
  <path d="M0 420 L800 300 L800 500 L0 500 Z" fill="#0b1626"/>
  <!-- banner string -->
  <path d="M -20 90 Q 400 190 820 70" fill="none" stroke="#d8e3fb" stroke-opacity="0.7" stroke-width="5"/>
  <!-- pennants -->
  <g>
    <path d="M96 108 L152 122 L110 168 Z" fill="#caf300"/>
    <path d="M216 132 L272 140 L236 190 Z" fill="#38bdf8"/>
    <path d="M340 148 L396 150 L364 202 Z" fill="#ff7a3d"/>
    <path d="M464 150 L520 146 L496 200 Z" fill="#caf300"/>
    <path d="M586 138 L640 128 L620 184 Z" fill="#bec6e0"/>
    <path d="M694 118 L746 104 L732 162 Z" fill="#ff7a3d"/>
  </g>
  <!-- confetti -->
  <g>
    <rect x="150" y="260" width="14" height="14" rx="3" fill="#caf300" transform="rotate(18 157 267)"/>
    <rect x="640" y="240" width="14" height="14" rx="3" fill="#38bdf8" transform="rotate(-24 647 247)"/>
    <rect x="250" y="330" width="12" height="12" rx="3" fill="#ff7a3d" transform="rotate(40 256 336)"/>
    <rect x="560" y="330" width="12" height="12" rx="3" fill="#caf300" transform="rotate(-12 566 336)"/>
    <circle cx="200" cy="210" r="7" fill="#bec6e0"/>
    <circle cx="610" cy="200" r="7" fill="#caf300"/>
    <circle cx="700" cy="300" r="6" fill="#38bdf8"/>
    <circle cx="110" cy="320" r="6" fill="#ff7a3d"/>
  </g>
  <!-- ball center stage -->
  <circle cx="400" cy="330" r="86" fill="#caf300"/>
  <circle cx="400" cy="330" r="86" fill="none" stroke="#8fae00" stroke-width="6"/>
  <g fill="#7d9600">
    <circle cx="372" cy="304" r="9"/><circle cx="418" cy="296" r="9"/><circle cx="442" cy="338" r="9"/>
    <circle cx="408" cy="368" r="9"/><circle cx="362" cy="350" r="9"/><circle cx="400" cy="330" r="9"/>
  </g>
  <ellipse cx="400" cy="452" rx="110" ry="14" fill="#040e1f"/>
</svg>
