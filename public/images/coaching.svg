<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Paddle serving a ball toward a target">
  <rect width="800" height="500" fill="#0b1626"/>
  <!-- diagonal court lines backdrop -->
  <g stroke="#1a2740" stroke-width="3">
    <line x1="0" y1="120" x2="800" y2="40"/>
    <line x1="0" y1="240" x2="800" y2="160"/>
    <line x1="0" y1="360" x2="800" y2="280"/>
    <line x1="0" y1="480" x2="800" y2="400"/>
  </g>
  <!-- target rings -->
  <circle cx="596" cy="196" r="120" fill="#152031"/>
  <circle cx="596" cy="196" r="120" fill="none" stroke="#38bdf8" stroke-width="6"/>
  <circle cx="596" cy="196" r="78" fill="none" stroke="#38bdf8" stroke-opacity="0.6" stroke-width="6"/>
  <circle cx="596" cy="196" r="36" fill="#caf300"/>
  <!-- trajectory -->
  <path d="M 210 330 Q 400 120 560 186" fill="none" stroke="#caf300" stroke-width="7" stroke-linecap="round" stroke-dasharray="1 22"/>
  <!-- ball mid-flight -->
  <circle cx="368" cy="216" r="26" fill="#caf300"/>
  <g fill="#7d9600">
    <circle cx="359" cy="208" r="3.6"/><circle cx="375" cy="205" r="3.6"/><circle cx="380" cy="222" r="3.6"/><circle cx="363" cy="226" r="3.6"/>
  </g>
  <!-- paddle -->
  <g transform="rotate(-38 200 360)">
    <rect x="148" y="252" width="112" height="200" rx="56" fill="#d8e3fb"/>
    <rect x="148" y="252" width="112" height="200" rx="56" fill="none" stroke="#ff7a3d" stroke-width="8"/>
    <rect x="187" y="446" width="34" height="88" rx="15" fill="#ff7a3d"/>
  </g>
</svg>
